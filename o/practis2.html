<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f1f3f6;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Segoe UI', sans-serif;
}
.login-card{
  background:#fff;
  padding:30px;
  border-radius:12px;
  width:350px;
  box-shadow:0 6px 20px rgba(0,0,0,.15);
}
.login-card h4{text-align:center;margin-bottom:20px;}
</style>
</head>

<body>

<div class="login-card">
  <h4>Login</h4>

  <div class="mb-3">
    <label>Email</label>
    <input type="email" id="email" class="form-control" placeholder="test@gmail.com">
  </div>

  <div class="mb-3">
    <label>Password</label>
    <input type="password" id="password" class="form-control" placeholder="123456">
  </div>

  <button class="btn btn-primary w-100" onclick="login()">Login</button>

  <p class="text-center text-muted mt-3">
    Demo Login<br>
    Email: <b>test@gmail.com</b><br>
    Password: <b>123456</b>
  </p>
</div>

<script>
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(email === "test@gmail.com" && password === "123456"){
    localStorage.setItem("isLoggedIn", "true");
    alert("Login successful!");
    window.location.href = "practis.html"; // change to your product page filename
  } else {
    alert("Invalid login details");
  }
}
</script>
<button class="btn btn-sm btn-danger position-fixed top-0 end-0 m-3" onclick="logout()">
  Logout
</button>
<script>
function logout(){
  localStorage.removeItem("isLoggedIn");
  localStorage.removeItem("rated");
  alert("Logged out");
  window.location.href = "login.html";
}
</script>

</body>
</html>
