<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mega Menu</title>

<style>
/* ===== MEGA MENU ===== */

.category-item {
  position: relative;
  display: inline-block;
}

.category-item > a {
  text-decoration: none;
  font-weight: 600;
  color: #333;
  padding: 10px 15px;
}

.mega-menu {
  position: absolute;
  top: 110%;
  left: -120px;
  width: 520px;
  background: #fff;
  padding: 25px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  border-radius: 18px;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  opacity: 0;
  visibility: hidden;
  transform: translateY(20px);
  transition: all .4s ease;
  z-index: 999;
}

/* SHOW MENU ON HOVER */
.category-item:hover .mega-menu {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.mega-col h4 {
  font-size: 14px;
  margin-bottom: 10px;
  color: #2874f0;
}

.mega-col a {
  display: block;
  margin-bottom: 8px;
  text-decoration: none;
  color: #333;
  font-size: 13px;
}

.mega-col a:hover {
  color: #f08804;
}
</style>
</head>

<body>

<div class="category-item dropdown">
  <a href="#">Categories</a>

  <div class="mega-menu">
    <div class="mega-col">
      <h4>Men</h4>
      <a href="#">T-Shirts</a>
      <a href="#">Jeans</a>
      <a href="#">Shoes</a>
    </div>

    <div class="mega-col">
      <h4>Women</h4>
      <a href="#">Dresses</a>
      <a href="#">Tops</a>
      <a href="#">Handbags</a>
    </div>

    <div class="mega-col">
      <h4>Kids</h4>
      <a href="#">Clothing</a>
      <a href="#">Footwear</a>
    </div>
  </div>
</div>

</body>
</html>
