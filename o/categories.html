<!DOCTYPE html>
<html>
<head>
<title>Categories</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FONT AWESOME -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>
<body>

<style>
body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:#f4f6fb;
}

.admin-wrapper{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#111827;
  color:#fff;
  padding:20px;
}
.logo{
  text-align:center;
  margin-bottom:30px;
}
.sidebar ul{
  list-style:none;
  padding:0;
}
.sidebar li{
  margin-bottom:8px;
  border-radius:8px;
}

.sidebar li a{
  display:block;
  padding:12px;
  color:#fff;
  text-decoration:none;
}

.sidebar li:hover,
.sidebar li.active{
  background:#2874f0;
}


/* MAIN */
.main{
  flex:1;
}

/* TOPBAR */
.topbar{
  height:60px;
  background:#fff;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

/* STAT CARDS */
.stat-card{
  padding:20px;
  border-radius:18px;
  color:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
}
.stat-card h6{
  font-size:14px;
  opacity:.9;
}
.stat-card h2{
  font-weight:800;
}

.blue{background:#2874f0}
.green{background:#16a34a}
.orange{background:#f97316}
.red{background:#dc2626}

/* DARK MODE */
body.dark{
  background:#0f172a;
  color:#fff;
}
body.dark .topbar{
  background:#111827;
  color:#fff;
}
</style>

<div class="admin-wrapper">

<aside class="sidebar">
  <h3 class="logo">ShopAdmin</h3>
  <ul>
    <li>
      <a href="index.html"><i class="fa fa-home"></i> Dashboard</a>
    </li>

    <li>
      <a href="product.html"><i class="fa fa-box"></i> Products</a>
    </li>

    <li class="active">
      <a href="categories.html"><i class="fa fa-list"></i> Categories</a>
    </li>

    <li>
      <a href="order.html"><i class="fa fa-shopping-cart"></i> Orders</a>
    </li>

    <li>
      <a href="user.html"><i class="fa fa-users"></i> Users</a>
    </li>

    <li>
      <a href="setting.html"><i class="fa fa-cog"></i> Settings</a>
    </li>
  </ul>
</aside>

<div class="main p-4">

<h4>Categories</h4>

<input class="form-control mb-3" placeholder="Add New Category">

<table class="table bg-white">
<tr>
<td>Ethnic Wear</td>
<td>
<button class="btn btn-danger btn-sm">Delete</button>
</td>
</tr>
</table>

</div>
</div>

</body>
</html>
