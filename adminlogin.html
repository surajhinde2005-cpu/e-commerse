<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - ShopEase</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .admin-login-container {
    background: white;
    padding: 40px 30px;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    width: 320px;
  }

  .admin-login-container h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #131921;
  }

  .admin-login-container input[type="text"],
  .admin-login-container input[type="password"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
  }

  .admin-login-container button {
    width: 100%;
    padding: 12px;
    background-color: #131921;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    color: white;
    cursor: pointer;
    font-weight: bold;
  }

  .admin-login-container button:hover {
    background-color: #2874f0;
  }

  .admin-login-container .back-link {
    margin-top: 15px;
    font-size: 14px;
    text-align: center;
  }

  .admin-login-container .back-link a {
    color: #f08804;
    text-decoration: none;
  }

  .admin-login-container .back-link a:hover {
    text-decoration: underline;
  }
</style>
</head>

<body>

<div class="admin-login-container">
  <h2>Admin Login</h2>
  <form onsubmit="return handleAdminLogin(event)">
    <input type="text" placeholder="Admin Username" required />
    <input type="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>
  <div class="back-link">
    <a href="frontpage.html">Back to Home</a>
  </div>
</div>

<script>
  function handleAdminLogin(event) {
    event.preventDefault();
    alert("Admin login clicked! ");
    return false;
  }
</script>

</body>
</html>
